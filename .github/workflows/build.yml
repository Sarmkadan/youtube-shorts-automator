name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Generate coverage report
      if: runner.os == 'Ubuntu'
      run: |
        dotnet test /p:CollectCoverage=true /p:CoverageFormat=opencover /p:CoverageFileName=coverage.xml

    - name: Upload coverage to Codecov
      if: runner.os == 'Ubuntu'
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Publish release build
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet publish -c Release -o ./publish

    - name: Build Docker image
      if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
      run: |
        docker build -t youtube-shorts-automator:latest .
        docker tag youtube-shorts-automator:latest youtube-shorts-automator:${{ github.ref_name }}

    - name: Push to Docker Hub
      if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
      run: |
        echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
        docker push youtube-shorts-automator:latest
        docker push youtube-shorts-automator:${{ github.ref_name }}

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Check code style with StyleCop
      run: dotnet build /p:EnforceCodeStyleInBuild=true

    - name: Run static analysis
      run: |
        dotnet tool install -g dotnet-sonarscanner
        dotnet-sonarscanner begin /k:"youtube-shorts-automator" /o:"sarmkadan" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
        dotnet build
        dotnet-sonarscanner end /d:sonar.login="${{ secrets.SONAR_TOKEN }}"
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Check dependencies for vulnerabilities
      run: |
        dotnet list package --vulnerable 2>&1 | grep -i "vulnerable" && exit 1 || exit 0
      continue-on-error: true
